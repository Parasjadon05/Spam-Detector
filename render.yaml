services:
  - type: web
    name: spam-detector-api
    runtime: python
    rootDir: server
    plan: free
    buildCommand: pip install -r requirements.txt && python scripts/download_data.py && python train.py
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: SPAM_THRESHOLD
        value: "0.65"
      - key: CORS_ORIGINS
        value: https://spam-detector-web.onrender.com

  - type: web
    name: spam-detector-web
    runtime: static
    rootDir: client
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        value: https://spam-detector-api.onrender.com
